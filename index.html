<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>לוח בית הכנסת</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#0a0a0a;
      --cyan:#59e9ff;
      --white:#f4f7ff;
      --yellow:#ffe95a;
      --green:#7cff9c;
      --red:#ff806f;
      --dim:#777;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#000;color:var(--white);font-family:"Arial Hebrew","Noto Sans Hebrew",Arial,sans-serif;overflow:hidden}
    body{display:flex;align-items:center;justify-content:center;padding:1.6vw}

    .board{
      width:min(98vw,1800px);
      aspect-ratio: 16/6.3;
      min-height:560px;
      background:
        radial-gradient(circle at 50% 42%,rgba(255,255,255,.04),transparent 42%),
        linear-gradient(#0c0c0c,#040404);
      border:clamp(12px,1.4vw,26px) solid #161616;
      border-radius:10px;
      box-shadow:0 16px 55px #000, inset 0 0 0 2px #2d2d2d;
      position:relative;
      padding:1.6vw 1.8vw 1.25vw;
      display:grid;
      grid-template-columns:1.08fr 1.9fr 1.05fr;
      grid-template-rows:auto 1fr auto auto;
      gap:.5vw 1.4vw;
    }

    .board::after{
      content:"";position:absolute;inset:0;pointer-events:none;opacity:.2;
      background-image:radial-gradient(circle,rgba(255,255,255,.42) 0 1px,transparent 1.15px);
      background-size:5px 5px;
      mix-blend-mode:screen;
    }

    .led{letter-spacing:.035em;text-shadow:0 0 8px currentColor,0 0 16px color-mix(in srgb,currentColor 45%,transparent)}
    .cyan{color:var(--cyan)} .yellow{color:var(--yellow)} .green{color:var(--green)} .red{color:var(--red)} .white{color:var(--white)}

    .top-left{grid-column:1;grid-row:1;direction:ltr;text-align:left;font-size:clamp(18px,2vw,42px);font-weight:800}
    .top-center{grid-column:2;grid-row:1;text-align:center;font-size:clamp(18px,2.05vw,42px);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-right{grid-column:3;grid-row:1;text-align:right;font-size:clamp(18px,1.9vw,40px);font-weight:800}

    .day{grid-column:1;grid-row:2;align-self:start;text-align:center;font-size:clamp(40px,5.6vw,105px);font-weight:900;line-height:1}
    .clock{grid-column:2;grid-row:2;align-self:center;text-align:center;direction:ltr;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:clamp(72px,10.1vw,195px);font-weight:500;line-height:.9;white-space:nowrap}
    .parasha{grid-column:3;grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.05}
    .parasha-label{font-size:clamp(22px,2.6vw,50px);font-weight:800}
    .parasha-name{font-size:clamp(48px,6.3vw,120px);font-weight:900;margin-top:.15em}

    .zmanim{grid-column:1/4;grid-row:3;display:grid;grid-template-columns:repeat(6,1fr);gap:.75vw;border-top:1px solid #222;padding-top:.65vw}
    .zman{text-align:center;min-width:0}
    .zman .label{font-size:clamp(15px,1.45vw,31px);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .zman .time{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:clamp(22px,2.65vw,52px);font-weight:800;direction:ltr}

    .ticker-wrap{grid-column:1/4;grid-row:4;border-top:1px solid #242424;padding-top:.55vw;overflow:hidden;white-space:nowrap;direction:ltr}
    .ticker{display:inline-block;min-width:100%;font-size:clamp(18px,1.85vw,38px);font-weight:800;animation:scroll 26s linear infinite;color:var(--yellow);text-shadow:0 0 8px currentColor;direction:rtl}
    @keyframes scroll{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

    .status-dot{display:inline-block;width:.5em;height:.5em;border-radius:50%;background:currentColor;box-shadow:0 0 12px currentColor;margin-inline:.25em}
    .small-credit{position:absolute;bottom:5px;left:12px;font-size:11px;color:#666;z-index:2}

    @media(max-width:900px){
      body{overflow:auto;padding:8px}
      .board{aspect-ratio:auto;min-height:96vh;grid-template-columns:1fr 1.5fr 1fr;gap:10px;padding:16px}
      .zmanim{grid-template-columns:repeat(3,1fr);row-gap:12px}
      .clock{font-size:clamp(62px,12vw,115px)}
    }
  </style>
</head>
<body>
  <main class="board" aria-label="לוח מידע דיגיטלי לבית הכנסת">
    <div id="gregDate" class="top-left led cyan">--.--.----</div>
    <div id="hebrewDate" class="top-center led yellow">טוען תאריך עברי...</div>
    <div id="nextEvent" class="top-right led cyan">זמני היום</div>

    <div id="dayName" class="day led white">יום</div>
    <div id="clock" class="clock led white">00:00:00</div>

    <section class="parasha">
      <div class="parasha-label led white">פרשת השבוע</div>
      <div id="parasha" class="parasha-name led white">טוען...</div>
    </section>

    <section class="zmanim">
      <div class="zman"><div class="label led yellow">עלות השחר</div><div id="alot" class="time led yellow">--:--</div></div>
      <div class="zman"><div class="label led yellow">זריחה</div><div id="sunrise" class="time led yellow">--:--</div></div>
      <div class="zman"><div class="label led yellow">סוף זמן שמע</div><div id="shema" class="time led yellow">--:--</div></div>
      <div class="zman"><div class="label led yellow">חצות</div><div id="chatzot" class="time led yellow">--:--</div></div>
      <div class="zman"><div class="label led yellow">שקיעה</div><div id="sunset" class="time led yellow">--:--</div></div>
      <div class="zman"><div class="label led yellow">צאת הכוכבים</div><div id="tzeit" class="time led yellow">--:--</div></div>
    </section>

    <div class="ticker-wrap"><div id="ticker" class="ticker">ברוכים הבאים לבית הכנסת • הלוח מתעדכן אוטומטית לפי שעון ניו יורק • זמני היום ופרשת השבוע מתעדכנים בכל יום</div></div>
    <div class="small-credit">Jewish calendar data: Hebcal.com</div>
  </main>

<script>
(() => {
  // ===== SETTINGS =====
  const SETTINGS = {
    timeZone: 'America/New_York',
    geonameId: 5128581, // New York City. Change this number for another city.
    use24Hour: true,
    congregationName: 'בית הכנסת אליהו הנביא'
  };

  const $ = id => document.getElementById(id);
  const hebDays = ['יום ראשון','יום שני','יום שלישי','יום רביעי','יום חמישי','יום שישי','שבת קודש'];

  function nyParts(date = new Date()) {
    const fmt = new Intl.DateTimeFormat('en-CA', {
      timeZone: SETTINGS.timeZone, year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, weekday:'short'
    });
    return Object.fromEntries(fmt.formatToParts(date).filter(p=>p.type!=='literal').map(p=>[p.type,p.value]));
  }

  function updateClock() {
    const p = nyParts();
    const h = p.hour === '24' ? '00' : p.hour;
    $('clock').textContent = `${h}:${p.minute}:${p.second}`;
    $('gregDate').textContent = `${p.month}.${p.day}.${p.year}`;

    const dayIndex = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(p.weekday);
    const afterSunset = false; // The civil weekday is shown, matching a standard clock board.
    $('dayName').textContent = hebDays[Math.max(0, dayIndex)];
  }

  function dateKey() {
    const p = nyParts();
    return `${p.year}-${p.month}-${p.day}`;
  }

  function setHebrewDate() {
    try {
      const s = new Intl.DateTimeFormat('he-u-ca-hebrew', {
        timeZone: SETTINGS.timeZone, day:'numeric', month:'long', year:'numeric'
      }).format(new Date());
      $('hebrewDate').textContent = `${SETTINGS.congregationName}  •  ${s}`;
    } catch {
      $('hebrewDate').textContent = SETTINGS.congregationName;
    }
  }

  function localTime(iso) {
    if (!iso) return '--:--';
    const d = new Date(iso);
    return new Intl.DateTimeFormat('en-GB', {
      timeZone: SETTINGS.timeZone, hour:'2-digit', minute:'2-digit', hour12:false
    }).format(d);
  }

  function pick(obj, keys) {
    for (const k of keys) if (obj && obj[k]) return obj[k];
    return null;
  }

  async function loadZmanim() {
    try {
      const url = `https://www.hebcal.com/zmanim?cfg=json&geonameid=${SETTINGS.geonameId}&date=${dateKey()}`;
      const r = await fetch(url, {cache:'no-store'});
      if (!r.ok) throw new Error('zmanim request failed');
      const data = await r.json();
      const t = data.times || {};

      $('alot').textContent = localTime(pick(t,['alotHaShachar','alotHaShachar72']));
      $('sunrise').textContent = localTime(pick(t,['sunrise']));
      $('shema').textContent = localTime(pick(t,['sofZmanShma','sofZmanShmaMGA']));
      $('chatzot').textContent = localTime(pick(t,['chatzot']));
      $('sunset').textContent = localTime(pick(t,['sunset']));
      $('tzeit').textContent = localTime(pick(t,['tzeit7083deg','tzeit85deg','tzeit42min']));
    } catch (e) {
      console.warn(e);
      $('ticker').textContent = 'לא ניתן היה לקבל זמני היום כרגע • השעון והתאריך ממשיכים לפעול • בדוק חיבור לאינטרנט';
    }
  }

  async function loadShabbat() {
    try {
      const url = `https://www.hebcal.com/shabbat?cfg=json&geonameid=${SETTINGS.geonameId}&M=on&leyning=off&lg=he`;
      const r = await fetch(url, {cache:'no-store'});
      if (!r.ok) throw new Error('shabbat request failed');
      const data = await r.json();
      const items = data.items || [];
      const parasha = items.find(x=>x.category==='parashat');
      const candles = items.find(x=>x.category==='candles');
      const havdalah = items.find(x=>x.category==='havdalah');
      const holiday = items.find(x=>x.category==='holiday' || x.category==='fast' || x.subcat==='fast');

      $('parasha').textContent = parasha?.hebrew?.replace(/^פרשת\s+/,'') || 'שבת';

      let eventText = 'זמני היום';
      if (holiday?.hebrew) eventText = holiday.hebrew;
      else if (candles) eventText = `הדלקת נרות ${localTime(candles.date)}`;
      else if (havdalah) eventText = `הבדלה ${localTime(havdalah.date)}`;
      $('nextEvent').textContent = eventText;

      const parts = [];
      if (parasha?.hebrew) parts.push(parasha.hebrew);
      if (candles) parts.push(`הדלקת נרות: ${localTime(candles.date)}`);
      if (havdalah) parts.push(`צאת השבת: ${localTime(havdalah.date)}`);
      if (holiday?.hebrew) parts.push(holiday.hebrew);
      parts.push('ברוכים הבאים');
      $('ticker').textContent = parts.join('  •  ');
    } catch (e) {
      console.warn(e);
      $('parasha').textContent = 'לא זמין';
    }
  }

  function refreshAll() {
    updateClock();
    setHebrewDate();
    loadZmanim();
    loadShabbat();
  }

  updateClock();
  setInterval(updateClock, 1000);
  refreshAll();
  setInterval(refreshAll, 30 * 60 * 1000);
})();
</script>
</body>
</html>
